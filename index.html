        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sale-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sale-card:active { transform: scale(0.98); }
        @keyframes heart-beat {
            0% { transform: scale(1); } 25% { transform: scale(1.2); }
            50% { transform: scale(0.95); } 100% { transform: scale(1); }
        }
        .subscribed { animation: heart-beat 0.4s ease; color: #ef4444; }
        @keyframes pulse-ring {
            0% { transform: scale(0.33); opacity: 1; }
            80%, 100% { transform: scale(2); opacity: 0; }
        }
        .map-marker::before {
            content: ''; position: absolute; left: -8px; top: -8px;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(239, 68, 68, 0.4);
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .timeline-line {
            background: linear-gradient(to bottom, #e5e7eb 0%, #ef4444 50%, #e5e7eb 100%);
        }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .filter-expand {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
        }
        .filter-expand.open { max-height: 200px; }
        @keyframes slide-down {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .update-toast { animation: slide-down 0.5s ease-out; }
        .install-banner {
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
        }
    </style>

    </header>

            { id: 30, outletId: 'zj-hangzhou-cs', brand: 'Nike', title: 'Nike 亲子运动季', discount: '5折起', start: '2026-04-18', end: '2026-04-28', status: 'ongoing', tags: ['亲子','运动'], hot: false, desc: '成人及儿童运动鞋服5折起，亲子搭配推荐。' }
        ];

        let currentView = 'list';
        let currentRegion = 'all';
        let showOngoingOnly = false;
        let searchQuery = '';
        let subscriptions = JSON.parse(localStorage.getItem('outlet_subscriptions') || '[]');
        let lastVisit = localStorage.getItem('last_visit_date');

        function init() {
            renderList();
            renderTimeline();
            renderMap();
            renderBrands();
            updateStats();
            checkNewContent();
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                refreshAllViews();
            });
            const now = new Date().toDateString();
            if (lastVisit !== now) {
                setTimeout(() => { document.getElementById('installBanner').classList.remove('hidden'); }, 2000);
                localStorage.setItem('last_visit_date', now);
            }
        }

        function getFilteredSales() {
            return salesData.filter(sale => {
                const outlet = outlets.find(o => o.id === sale.outletId);
                if (!outlet) return false;
                if (currentRegion !== 'all' && outlet.region !== currentRegion) return false;
                if (showOngoingOnly && sale.status !== 'ongoing') return false;
                if (searchQuery) {
                    const match = sale.brand.toLowerCase().includes(searchQuery) || 
                                 sale.title.includes(searchQuery) ||
                                 outlet.name.includes(searchQuery) ||
                                 outlet.city.includes(searchQuery);
                    if (!match) return false;
                }
                return true;
            });
        }

        function getSubscribedSales() {
            return salesData.filter(sale => subscriptions.includes(sale.brand));
        }

        function checkNewContent() {
            const today = new Date().toISOString().split('T')[0];
            const newSales = salesData.filter(s => s.start === today || (lastVisit && new Date(s.start) > new Date(lastVisit)));
            if (newSales.length > 0 && lastVisit) {
                showToast('今日新增 ' + newSales.length + ' 场特卖会！');
            }
        }

        function renderList() {
            const container = document.getElementById('listView');
            const sales = currentView === 'subscribed' ? getSubscribedSales() : getFilteredSales();
            if (sales.length === 0) {
                container.innerHTML = '';
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('emptyState').classList.add('flex');
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('flex');
            container.innerHTML = sales.map(sale => {
                const outlet = outlets.find(o => o.id === sale.outletId);
                const isSub = subscriptions.includes(sale.brand);
                const daysLeft = Math.ceil((new Date(sale.end) - new Date()) / (1000 * 60 * 60 * 24));
                const isNew = !lastVisit || new Date(sale.start) > new Date(lastVisit);
                return `
                <div class="sale-card bg-white rounded-xl border border-slate-200 overflow-hidden hover:shadow-lg cursor-pointer group" onclick="showDetail(${sale.id})">
                    <div class="relative h-40 bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center">
                        <div class="text-center">
                            <div class="text-3xl font-black text-slate-300 tracking-wider">${sale.brand}</div>
                            <div class="text-sm text-slate-400 mt-1">品牌特卖</div>
                        </div>
                        ${sale.hot ? '<div class="absolute top-3 left-3 bg-red-500 text-white text-xs px-2 py-1 rounded-full font-bold"><i class="fas fa-fire mr-1"></i>热门</div>' : ''}
                        ${isNew ? '<div class="absolute top-3 left-3 bg-blue-500 text-white text-xs px-2 py-1 rounded-full font-bold"><i class="fas fa-sparkles mr-1"></i>新上架</div>' : ''}
                        <div class="absolute top-3 right-3 ${sale.status === 'ongoing' ? 'bg-green-500' : 'bg-orange-500'} text-white text-xs px-2 py-1 rounded-full">
                            ${sale.status === 'ongoing' ? '进行中' : '即将开始'}
                        </div>
                        ${daysLeft > 0 && daysLeft <= 3 ? `<div class="absolute bottom-3 right-3 bg-red-50 text-red-600 text-xs px-2 py-1 rounded-full border border-red-100 font-medium">剩${daysLeft}天</div>` : ''}
                    </div>
                    <div class="p-4">
                        <div class="flex items-start justify-between mb-2">
                            <h3 class="font-bold text-slate-800 line-clamp-1">${sale.title}</h3>
                            <button onclick="event.stopPropagation(); toggleSubscribe('${sale.brand}')" class="text-lg ${isSub ? 'subscribed' : 'text-slate-300 hover:text-red-400'} transition-colors">
                                <i class="${isSub ? 'fas' : 'far'} fa-heart"></i>
                            </button>
                        </div>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-2xl font-black text-red-600">${sale.discount}</span>
                        </div>
                        <div class="flex items-center justify-between text-xs text-slate-500 mb-3">
                            <span class="flex items-center gap-1"><i class="fas fa-map-marker-alt text-slate-400"></i>${outlet.city}·${outlet.name.replace('奥特莱斯','').replace('购物村','')}</span>
                            <span class="flex items-center gap-1"><i class="fas fa-calendar-alt text-slate-400"></i>${sale.start.slice(5)}-${sale.end.slice(5)}</span>
                        </div>
                        <div class="flex flex-wrap gap-1.5">
                            ${sale.tags.map(tag => `<span class="px-2 py-0.5 bg-slate-100 text-slate-600 text-xs rounded-md">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            const sales = [...getFilteredSales()].sort((a, b) => new Date(a.start) - new Date(b.start));
            if (sales.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-10">暂无数据</div>';
                return;
            }
            const grouped = {};
            sales.forEach(sale => {
                const month = sale.start.slice(0, 7);
                if (!grouped[month]) grouped[month] = [];
                grouped[month].push(sale);
            });
            container.innerHTML = Object.entries(grouped).map(([month, items]) => `
                <div class="mb-8 relative">
                    <div class="absolute -left-8 top-0 flex items-center justify-center w-6 h-6 bg-white border-2 border-red-500 rounded-full z-10">
                        <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                    </div>
                    <h3 class="font-bold text-lg text-slate-800 mb-4">${month}月</h3>
                    <div class="space-y-3">
                        ${items.map(sale => {
                            const outlet = outlets.find(o => o.id === sale.outletId);
                            const isSub = subscriptions.includes(sale.brand);
                            return `
                            <div class="bg-white p-4 rounded-xl border border-slate-200 hover:shadow-md transition-shadow cursor-pointer" onclick="showDetail(${sale.id})">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="font-bold text-slate-800">${sale.brand}</span>
                                            <span class="text-xs ${sale.status === 'ongoing' ? 'text-green-600 bg-green-50' : 'text-orange-600 bg-orange-50'} px-2 py-0.5 rounded-full">${sale.status === 'ongoing' ? '进行中' : '即将开始'}</span>
                                        </div>
                                        <h4 class="text-sm text-slate-600 mb-2">${sale.title}</h4>
                                        <div class="flex items-center gap-3 text-xs text-slate-500">
                                            <span class="text-red-600 font-bold">${sale.discount}</span>
                                            <span>${outlet.name}</span>
                                            <span>${sale.start} 至 ${sale.end}</span>
                                        </div>
                                    </div>
                                    <button onclick="event.stopPropagation(); toggleSubscribe('${sale.brand}')" class="text-lg ${isSub ? 'text-red-500' : 'text-slate-300'} ml-2">
                                        <i class="${isSub ? 'fas' : 'far'} fa-heart"></i>
                                    </button>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderMap() {
            const svg = document.getElementById('mapSvg');
            svg.querySelectorAll('.map-marker').forEach(el => el.remove());
            outlets.forEach(outlet => {
                const x = ((outlet.lng - 119.5) / 2.5) * 800;
                const y = 600 - ((outlet.lat - 29.5) / 2.5) * 600;
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.classList.add('map-marker');
                g.style.cursor = 'pointer';
                g.innerHTML = `
                    <circle cx="${x}" cy="${y}" r="8" fill="#ef4444" stroke="white" stroke-width="2"/>
                    <text x="${x}" y="${y - 12}" text-anchor="middle" class="text-xs fill-slate-700 font-medium" style="font-size: 10px;">${outlet.name.replace('奥特莱斯','').replace('购物村','')}</text>
                `;
                g.addEventListener('click', () => { showMapTooltip(outlet, x, y); });
                svg.appendChild(g);
            });
        }

        function renderBrands() {
            const allBrands = [...new Set(outlets.flatMap(o => o.brands))].sort();
            const grid = document.getElementById('brandsGrid');
            grid.innerHTML = allBrands.map(brand => {
                const isSub = subscriptions.includes(brand);
                const count = salesData.filter(s => s.brand === brand).length;
                return `
                <div class="bg-white rounded-xl border ${isSub ? 'border-red-200 bg-red-50' : 'border-slate-200'} p-4 flex flex-col items-center gap-2 cursor-pointer transition-all hover:shadow-md" onclick="toggleSubscribe('${brand}')">
                    <div class="w-12 h-12 rounded-full ${isSub ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-400'} flex items-center justify-center text-lg font-bold mb-1">
                        ${brand.charAt(0)}
                    </div>
                    <span class="font-medium text-sm ${isSub ? 'text-red-700' : 'text-slate-700'}">${brand}</span>
                    <button class="text-lg ${isSub ? 'subscribed text-red-500' : 'text-slate-300'}">
                        <i class="${isSub ? 'fas' : 'far'} fa-heart"></i>
                    </button>
                    ${count > 0 ? `<span class="text-[10px] text-slate-500">${count}场特卖</span>` : ''}
                </div>
                `;
            }).join('');
        }

        function switchView(view) {
            currentView = view;
            ['listView', 'timelineView', 'mapView', 'brandsView'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.querySelectorAll('.view-btn, .nav-btn').forEach(btn => {
                const isActive = btn.dataset.view === view;
                if (btn.classList.contains('view-btn')) {
                    btn.classList.toggle('bg-white', isActive);
                    btn.classList.toggle('shadow-sm', isActive);
                    btn.classList.toggle('text-red-600', isActive);
                    btn.classList.toggle('text-slate-600', !isActive);
                } else {
                    btn.classList.toggle('text-red-600', isActive);
                    btn.classList.toggle('text-slate-400', !isActive);
                }
            });
            if (view === 'subscribed') {
                document.getElementById('pageTitle').textContent = '我的订阅';
                document.getElementById('listView').classList.remove('hidden');
                renderList();
            } else if (view === 'list' || view === 'timeline' || view === 'map' || view === 'brands') {
                document.getElementById('pageTitle').textContent = view === 'list' ? '最新特卖会' : 
                                                                   view === 'timeline' ? '特卖时间线' :
                                                                   view === 'map' ? '奥莱地图' : '品牌订阅';
                document.getElementById(view + 'View').classList.remove('hidden');
                if (view === 'list') renderList();
                if (view === 'timeline') renderTimeline();
                if (view === 'brands') renderBrands();
            }
            updateStats();
        }

        function filterRegion(region) {
            currentRegion = region;
            document.querySelectorAll('.region-btn').forEach(btn => {
                const isActive = btn.dataset.region === region;
                btn.classList.toggle('bg-red-50', isActive);
                btn.classList.toggle('text-red-600', isActive);
                btn.classList.toggle('border-red-200', isActive);
                btn.classList.toggle('font-medium', isActive);
                btn.classList.toggle('bg-slate-50', !isActive);
                btn.classList.toggle('text-slate-600', !isActive);
                btn.classList.toggle('border-slate-200', !isActive);
            });
            refreshAllViews();
        }

        function filterStatus() {
            showOngoingOnly = !showOngoingOnly;
            const btn = document.getElementById('ongoingFilter');
            btn.classList.toggle('bg-orange-50', showOngoingOnly);
            btn.classList.toggle('text-orange-600', showOngoingOnly);
            btn.classList.toggle('bg-slate-50', !showOngoingOnly);
            btn.classList.toggle('text-slate-600', !showOngoingOnly);
            refreshAllViews();
        }

        function toggleSubscribe(brand) {
            const idx = subscriptions.indexOf(brand);
            if (idx > -1) {
                subscriptions.splice(idx, 1);
                showToast('已取消订阅 ' + brand);
            } else {
                subscriptions.push(brand);
                showToast('已订阅 ' + brand + ' 特卖信息');
            }
            localStorage.setItem('outlet_subscriptions', JSON.stringify(subscriptions));
            refreshAllViews();
        }

        function clearAllSubscriptions() {
            subscriptions = [];
            localStorage.removeItem('outlet_subscriptions');
            renderBrands();
            showToast('已清空所有订阅');
        }

        function showSubscribedOnly() {
            switchView('subscribed');
        }

        function refreshAllViews() {
            if (currentView === 'list' || currentView === 'subscribed') renderList();
            if (currentView === 'timeline') renderTimeline();
            if (currentView === 'brands') renderBrands();
            updateStats();
        }

        function updateStats() {
            const count = currentView === 'subscribed' ? getSubscribedSales().length : getFilteredSales().length;
            const subCount = subscriptions.length;
            document.getElementById('resultCount').textContent = 
                currentView === 'subscribed' ? '已订阅 ' + subCount + ' 个品牌，当前 ' + count + ' 场特卖' :
                '共 ' + count + ' 场特卖会' + (subCount > 0 ? '，订阅了 ' + subCount + ' 个品牌' : '');
        }

        function refreshData() {
            showToast('数据已刷新');
            checkNewContent();
            refreshAllViews();
        }

        function showDetail(saleId) {
            const sale = salesData.find(s => s.id === saleId);
            if (!sale) return;
            const outlet = outlets.find(o => o.id === sale.outletId);
            const isSub = subscriptions.includes(sale.brand);
            document.getElementById('modalTitle').textContent = sale.title;
            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-3 bg-red-50 rounded-xl border border-red-100">
                        <div>
                            <div class="text-xs text-red-600 mb-1">折扣力度</div>
                            <div class="text-2xl font-black text-red-600">${sale.discount}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-slate-500 mb-1">状态</div>
                            <div class="inline-block px-3 py-1 rounded-full text-sm font-medium ${sale.status === 'ongoing' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                                ${sale.status === 'ongoing' ? '进行中' : '即将开始'}
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="p-3 bg-slate-50 rounded-lg">
                            <div class="text-xs text-slate-500 mb-1">商场</div>
                            <div class="font-medium text-sm">${outlet.name}</div>
                            <div class="text-xs text-slate-400 mt-0.5">${outlet.address}</div>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-lg">
                            <div class="text-xs text-slate-500 mb-1">时间</div>
                            <div class="font-medium text-sm">${sale.start} 至</div>
                            <div class="font-medium text-sm">${sale.end}</div>
                        </div>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-slate-700 mb-2">活动详情</div>
                        <p class="text-sm text-slate-600 leading-relaxed">${sale.desc}</p>
                    </div>
                    <div>
                        <div class="text-sm font-medium text-slate-700 mb-2">标签</div>
                        <div class="flex flex-wrap gap-2">
                            ${sale.tags.map(tag => `<span class="px-3 py-1 bg-slate-100 text-slate-600 text-sm rounded-full">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <div class="pt-4 space-y-2">
                        <button onclick="toggleSubscribe('${sale.brand}'); closeModal()" class="w-full py-3 rounded-xl font-medium transition-all ${isSub ? 'bg-slate-100 text-slate-700' : 'bg-red-500 text-white hover:bg-red-600'}">
                            ${isSub ? '<i class="fas fa-check mr-2"></i>已订阅' : '<i class="far fa-heart mr-2"></i>订阅该品牌特卖'}
                        </button>
                        <button onclick="closeModal()" class="w-full py-3 bg-white border border-slate-200 text-slate-700 rounded-xl font-medium hover:bg-slate-50">关闭</button>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function showMapTooltip(outlet, x, y) {
            const tooltip = document.getElementById('mapTooltip');
            const sales = salesData.filter(s => s.outletId === outlet.id);
            document.getElementById('tooltipTitle').textContent = outlet.name;
            document.getElementById('tooltipInfo').innerHTML = 
                outlet.address + '<br>当前' + sales.length + '场特卖会<br>' + outlet.brands.slice(0,5).join('、') + '等';
            tooltip.style.left = Math.min(x + 20, 600) + 'px';
            tooltip.style.top = (y - 20) + 'px';
            tooltip.classList.remove('hidden');
            setTimeout(() => tooltip.classList.add('hidden'), 3000);
        }

        function toggleFilter() {
            document.getElementById('filterBar').classList.toggle('open');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('hidden');
            toast.classList.add('flex');
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('flex');
            }, 2000);
        }

        function dismissInstall() {
            document.getElementById('installBanner').classList.add('hidden');
            localStorage.setItem('install_dismissed', Date.now().toString());
        }

        function showInstallGuide() {
            document.getElementById('installGuide').classList.remove('hidden');
            document.getElementById('installBanner').classList.add('hidden');
        }

        function closeInstallGuide() {
            document.getElementById('installGuide').classList.add('hidden');
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
